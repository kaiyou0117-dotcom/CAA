<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メッセージ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0c0e; --bubble-in:#26272b; --bubble-in-text:#f0f0f2;
    --accent:#5b8def; --muted:#7c7f87; --divider:#1c1d20;
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0; min-height:100vh; background:#000;
    font-family:'Noto Sans JP', sans-serif;
  }
  body{display:flex; align-items:center; justify-content:center; padding:24px 12px;}

  .phone{
    width:100%; max-width:400px; height:min(760px, 92vh);
    background:var(--bg); border-radius:28px; box-shadow:0 20px 60px rgba(0,0,0,.6);
    display:flex; flex-direction:column; overflow:hidden; border:1px solid #1a1a1c;
  }

  .chat-header{
    background:#141517; padding:14px 16px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--divider); flex-shrink:0;
  }
  .avatar{
    width:38px; height:38px; border-radius:50%; background:#2a2b30;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    color:#5a5b60; font-size:15px;
  }
  .chat-header .who{flex:1; min-width:0;}
  .chat-header .name{color:#f0f0f2; font-size:14.5px; font-weight:600;}
  .chat-header .status{color:var(--muted); font-size:11.5px; margin-top:1px;}

  .chat-body{
    flex:1; overflow-y:auto; padding:18px 14px 12px;
    display:flex; flex-direction:column; gap:4px;
  }

  .day-divider{
    text-align:center; color:var(--muted); font-size:10.5px; margin:14px 0 10px;
    letter-spacing:.02em;
  }

  .bubble-row{display:flex; margin-bottom:4px;}
  .bubble{
    max-width:76%; padding:9px 13px; border-radius:16px; font-size:14px; line-height:1.55;
    background:var(--bubble-in); color:var(--bubble-in-text); border-bottom-left-radius:4px;
    opacity:0; transform:translateY(6px);
    animation:bubble-in .4s ease forwards;
  }
  @keyframes bubble-in{ to{ opacity:1; transform:translateY(0); } }

  .time-stamp{
    font-size:10px; color:var(--muted); margin:2px 4px 10px; padding-left:2px;
  }

  .waiting-note{
    text-align:center; color:#4a4b50; font-size:11.5px; padding:24px 20px;
    line-height:1.8;
  }

  .empty-state{
    flex:1; display:flex; align-items:center; justify-content:center;
    text-align:center; color:#45464b; font-size:12.5px; padding:30px; line-height:1.9;
  }

  .typing{
    display:inline-flex; gap:3px; padding:11px 14px; background:var(--bubble-in);
    border-radius:16px; border-bottom-left-radius:4px; width:fit-content;
  }
  .typing span{
    width:5px; height:5px; border-radius:50%; background:#7c7f87;
    animation:typing-blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes typing-blink{ 0%,60%,100%{opacity:.3;} 30%{opacity:1;} }
</style>
</head>
<body>

<div class="phone">
  <div class="chat-header">
    <div class="avatar">?</div>
    <div class="who">
      <div class="name">不明の相手</div>
      <div class="status" id="chat-status">最終アクセス:―</div>
    </div>
  </div>
  <div class="chat-body" id="chat-body"></div>
</div>

<script>
  (function(){

    // ── メッセージ定義(ステージごとに複数の吹き出し) ──
    var STAGES = [
      {
        flag: 'arg_msg_login',
        dayLabel: 'STEP 1',
        lines: [
          'できましたね。',
          '正直、ここまで来る人は多くないです。',
          '次は「霞坂」で調べてみてください。何か出てくるはずです。'
        ]
      },
      {
        flag: 'arg_msg_news',
        dayLabel: 'STEP 2',
        lines: [
          'その記事、読みました?',
          '表向きの説明だけです。あれで全部だと思いますか?',
          '本当に見てほしいのは、その奥にあるものです。'
        ]
      },
      {
        flag: 'arg_msg_zerodossier',
        dayLabel: 'STEP 3',
        lines: [
          'ここまで来るとは思いませんでした。',
          '正直に言うと、この先が何なのか、私にもまだ分かっていません。',
          'でも、ここで止まるのはもったいない。一緒に確かめませんか。'
        ]
      },
      {
        flag: 'arg_msg_zerotrue',
        dayLabel: 'STEP 4',
        lines: [
          '……見ましたね。',
          '視ましたね?',
          'やっと、分かってくれる人が現れた。',
          '大丈夫。怖くありません。ちゃんと視れば、分かりますから。'
        ]
      },
      {
        flag: 'arg_msg_corona',
        dayLabel: 'STEP 5',
        lines: [
          'あれ。',
          '聞こえてます?',
          'おかしいな……さっきまで、繋がってたのに。',
          'ねえ。',
          'もう一度、話しましょう。ね?'
        ]
      }
    ];

    var chatBody = document.getElementById('chat-body');
    var chatStatus = document.getElementById('chat-status');

    function formatTime(iso){
      var d = new Date(iso);
      var mm = d.getMonth() + 1;
      var dd = d.getDate();
      var hh = String(d.getHours()).padStart(2, '0');
      var mi = String(d.getMinutes()).padStart(2, '0');
      return mm + '月' + dd + '日 ' + hh + ':' + mi;
    }

    var unlockedStages = STAGES.filter(function(s){
      return !!localStorage.getItem(s.flag);
    });

    if(unlockedStages.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'まだメッセージはありません。';
      chatBody.appendChild(empty);
    } else {
      unlockedStages.forEach(function(stage, si){
        var ts = localStorage.getItem(stage.flag);

        var divider = document.createElement('div');
        divider.className = 'day-divider';
        divider.textContent = formatTime(ts);
        chatBody.appendChild(divider);

        stage.lines.forEach(function(line, li){
          var row = document.createElement('div');
          row.className = 'bubble-row';
          var bubble = document.createElement('div');
          bubble.className = 'bubble';
          bubble.textContent = line;
          bubble.style.animationDelay = (li * 0.12) + 's';
          row.appendChild(bubble);
          chatBody.appendChild(row);
        });

        var stamp = document.createElement('div');
        stamp.className = 'time-stamp';
        stamp.textContent = '既読';
        chatBody.appendChild(stamp);
      });

      var lastTs = localStorage.getItem(unlockedStages[unlockedStages.length - 1].flag);
      chatStatus.textContent = '最終アクセス:' + formatTime(lastTs);

      if(unlockedStages.length < STAGES.length){
        var waiting = document.createElement('div');
        waiting.className = 'waiting-note';
        waiting.textContent = '……';
        chatBody.appendChild(waiting);
      }
    }

    chatBody.scrollTop = chatBody.scrollHeight;
  })();
</script>

</body>
</html>
