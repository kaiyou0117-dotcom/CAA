<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>検索結果 | CAA Internal Network</title>
<meta name="description" content="大陸魔導協会 内部データベース検索結果。">
<!-- 本検索の利用履歴はすべて記録され、内部監察班により監査される -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0d; --surface:#111318; --surface-2:#161922; --border:#242730;
    --text:#c7cbd1; --dim:#666b75; --accent:#59d9c4; --alert:#e07a7a; --alert-bg:#241417;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Noto Sans JP','IBM Plex Mono',sans-serif; font-size:14px; line-height:1.8;
  }
  a{color:var(--accent); text-decoration:none;}
  a:hover{text-decoration:underline;}
  a:focus-visible, button:focus-visible, input:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .doc-top-bar{
    background:#000; padding:10px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .doc-top-bar .brand{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; color:var(--dim); text-transform:uppercase;
  }
  .doc-top-bar .brand span{color:var(--accent);}
  .doc-search{display:flex; align-items:center; gap:6px;}
  .doc-search input{
    background:#0a0b0d; border:1px solid var(--border); color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:11px; padding:5px 10px; width:220px;
  }
  .doc-search input::placeholder{color:var(--dim);}
  .doc-search button{
    background:transparent; border:1px solid var(--border); color:var(--dim);
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:5px 12px; cursor:pointer;
  }
  .doc-search button:hover{border-color:var(--accent); color:var(--accent);}

  .console{max-width:760px; margin:0 auto; padding:28px 20px 60px;}

  .query-bar{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--dim);
    margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border);
    word-break:break-all;
  }
  .query-bar .path{color:var(--accent);}

  h1#result-heading{
    font-family:'Noto Serif JP',serif; font-size:19px; font-weight:600; margin:0 0 20px; color:#eceefb;
    word-break:break-word;
  }

  .no-result-box{
    background:var(--alert-bg); border:1px solid #4a2224; border-left:3px solid var(--alert);
    padding:20px 22px;
  }
  .no-result-box p{margin:0 0 10px; font-size:13.5px; color:#e2b8b8;}
  .no-result-box p:last-child{margin-bottom:0;}
  .no-result-box .code{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); letter-spacing:.03em;
    display:block; margin-top:12px;
  }

  .result-hit{
    background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent);
    padding:20px 22px;
  }
  .result-hit .hit-count{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim);
    letter-spacing:.04em; margin-bottom:14px; display:block;
  }
  .result-hit .hit-url{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--accent); margin-bottom:6px;
  }
  .result-hit .hit-title{
    font-family:'Noto Serif JP',serif; font-size:16.5px; font-weight:600; margin:0 0 8px;
  }
  .result-hit .hit-title a{color:#eceefb;}
  .result-hit .hit-snippet{margin:0; font-size:13px; color:var(--text);}

  .retry-form{display:flex; gap:10px; margin-top:22px; flex-wrap:wrap;}
  .retry-form input{
    flex:1; min-width:200px; font-family:'IBM Plex Mono',monospace; font-size:13px;
    color:var(--text); background:var(--surface); border:1px solid var(--border); padding:10px 12px;
  }
  .retry-form input::placeholder{color:var(--dim);}
  .retry-form button{
    background:var(--surface-2); color:var(--text); font-weight:500; border:1px solid var(--border);
    padding:10px 22px; font-size:13px; letter-spacing:.02em; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
  }
  .retry-form button:hover{border-color:var(--accent); color:var(--accent);}

  .suggestions{margin-top:36px; padding-top:24px; border-top:1px solid var(--border);}
  .suggestions p{font-size:12.5px; color:var(--dim); margin:0 0 16px;}
  .link-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .link-card{
    background:var(--surface); border:1px solid var(--border); padding:14px 12px;
    font-size:12.5px; text-align:center;
  }
  .link-card a{color:var(--text); font-weight:500;}
  .link-card a:hover{color:var(--accent);}

  footer{
    border-top:1px solid var(--border); margin-top:20px; padding:16px 20px;
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; max-width:760px; margin-left:auto; margin-right:auto;
  }

  @media (max-width:640px){
    .link-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<div class="doc-top-bar">
  <div class="brand">CAA <span>Internal Search Index</span></div>
  <form class="doc-search" action="search-internal.html" method="get" role="search">
    <input type="text" name="q" placeholder="内部データベースを検索" aria-label="内部データベース検索" autocomplete="off">
    <button type="submit">検索</button>
  </form>
</div>

<div class="console">

  <div class="query-bar" id="query-bar">caa-internal-db &gt; search &gt; query: —</div>

  <h1 id="result-heading">検索結果</h1>

  <section id="result-body">
    <div class="no-result-box" id="result-box">
      <p id="result-message">検索キーワードが指定されていません。</p>
    </div>

    <form class="retry-form" id="retry-form">
      <input type="text" id="retry-input" placeholder="別のキーワードで再検索" autocomplete="off">
      <button type="submit">再検索</button>
    </form>
  </section>

  <section class="suggestions">
    <p>内部データベースの検索対象は一部の索引記録に限定されています。目的の記録が見つからない場合は、ダッシュボードより直接ご確認ください。</p>
    <div class="link-grid">
      <div class="link-card"><a href="members.html">ダッシュボード</a></div>
      <div class="link-card"><a href="profile.html">個人記録</a></div>
      <div class="link-card"><a href="index.html">公式サイトへ戻る</a></div>
    </div>
  </section>

</div>

<footer>
  <span>Continental Arcane Authority — Internal Search Index</span>
  <span>Access log recorded</span>
</footer>

<script>
  (function(){
    function escapeHtml(str){
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    var params = new URLSearchParams(window.location.search);
    var query = params.get('q');

    var heading = document.getElementById('result-heading');
    var resultBox = document.getElementById('result-box');
    var queryBar = document.getElementById('query-bar');

    // 検索インデックス(値は配列。1キーワードに複数ヒットを持たせられる)
    var SPECIAL_MATCHES = {
      '第一級指名手配対象': [
        {
          url: 'wanted-list.html',
          title: '指名手配対象リスト | CAA Internal Network',
          snippet: '正義部門が管轄する、日本支部管轄区域内の追跡対象一覧です。危険度別に案件を確認できます。'
        }
      ],
      '霞坂地区三丁目': [
        {
          url: 'news-kasumizaka-2005.html',
          title: '秋季例大祭、荒天のため中止に|霞坂民報デジタルアーカイブ',
          snippet: '2005年10月10日付 霞坂民報朝刊記事。霞坂神社の秋季例大祭に関する当時の報道アーカイブ。'
        }
      ],
      '秋季例大祭': [
        {
          url: 'case-overview-2005.html',
          title: '案件概要書 ― 霞坂神社 秋季例大祭中断事案',
          snippet: '2005年に霞坂神社で発生した事案の概要をまとめた内部文書。一部区画はクリアランス不足により非表示。'
        },
        {
          url: 'faith-ops-log-2005.html',
          title: '現場対応記録 ― 霞坂神社 秋季例大祭中断事案',
          snippet: '2005年10月9日、信仰部門・愛部門による現地対応を時系列で記録した現場報告書。'
        }
      ],
      'V-2005-1042': [
        {
          url: 'memory-log-2005.html',
          title: 'V-2005-1042 | memory_processing_log',
          snippet: '愛部門《ウェリタス》による記憶処理の実施記録。対象者一覧及び執行タイムラインを収録。'
        }
      ],
      '白霞大神': [
        {
          url: 'zero-dossier.html',
          title: '観測対象・零 概要書類 | OBS-000',
          snippet: '節制部門が管理する最重要機密記録。閲覧には別途アクセスコードが必要です。'
        }
      ]
    };

    if(query && query.trim() !== ''){
      var q = query.trim();
      var safeQ = escapeHtml(q);
      heading.innerHTML = '「' + safeQ + '」の検索結果';
      document.title = '「' + q + '」の検索結果 | CAA Internal Network';
      queryBar.innerHTML = '<span class="path">caa-internal-db</span> &gt; search &gt; query: "' + safeQ + '"';

      var hits = SPECIAL_MATCHES[q];

      if(hits && hits.length > 0){
        var hitsHtml = hits.map(function(hit){
          return (
            '<div class="result-hit">' +
              '<div class="hit-url">caa-internal-db / ' + hit.url + '</div>' +
              '<h3 class="hit-title"><a href="' + hit.url + '">' + escapeHtml(hit.title) + '</a></h3>' +
              '<p class="hit-snippet">' + escapeHtml(hit.snippet) + '</p>' +
            '</div>'
          );
        }).join('<div style="height:12px;"></div>');

        resultBox.outerHTML =
          '<div id="result-box">' +
            '<span class="hit-count" style="display:block; font-family:\'IBM Plex Mono\',monospace; font-size:11px; color:var(--dim); letter-spacing:.04em; margin-bottom:10px;">' + hits.length + '件の情報が見つかりました。</span>' +
            hitsHtml +
          '</div>';
      } else {
        var message = document.getElementById('result-message');
        var codeNote = document.createElement('span');
        codeNote.className = 'code';
        message.innerHTML = '「' + safeQ + '」に一致する情報は見つかりませんでした。';
        codeNote.textContent = 'QUERY: "' + q + '" — 0 件ヒット';
        resultBox.appendChild(codeNote);
      }
    } else {
      heading.textContent = '検索結果';
      queryBar.textContent = 'caa-internal-db > search > query: (empty)';
      document.getElementById('result-message').textContent = '検索キーワードが指定されていません。上部の検索ボックスよりキーワードを入力してください。';
    }

    document.getElementById('retry-form').addEventListener('submit', function(e){
      e.preventDefault();
      var val = document.getElementById('retry-input').value.trim();
      window.location.href = 'search-internal.html?q=' + encodeURIComponent(val);
    });
  })();
</script>

</body>
</html>
